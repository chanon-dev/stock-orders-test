version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: stock-orders-db
    restart: always
    environment:
      POSTGRES_DB: StockOrdersDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-orders-api
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=StockOrdersDb;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    container_name: stock-orders-web
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
